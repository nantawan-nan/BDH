name: db-migrate

on:
  push:
    paths:
      - 'supabase/**.sql'
  workflow_dispatch:

jobs:
  migrate:
    name: Run SQL Migrations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install PostgreSQL client 17
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17
          psql --version

      # Management API บน project นี้ fail (clone) → ใช้ psql ต่อ Session pooler แทน
      # (secret เดียวกับ backup workflow ที่ทำงานได้แล้ว)
      - name: Apply SQL migrations via psql (Session pooler)
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$DB_URL" ]; then
            echo "❌ ยังไม่ได้ตั้ง GitHub secret 'SUPABASE_DB_URL'"
            echo "   Supabase → Project Settings → Database → Connection string → URI (Session pooler)"
            exit 1
          fi

          SQL_FILES=$(ls supabase/*.sql 2>/dev/null | sort)
          if [ -z "$SQL_FILES" ]; then
            echo "ไม่พบไฟล์ .sql"
            exit 0
          fi

          FAIL=0
          for FILE in $SQL_FILES; do
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "▶ รัน: $FILE"
            # ไฟล์ idempotent ทุกตัว (CREATE IF NOT EXISTS / DROP+CREATE POLICY) → รันซ้ำได้
            if psql "$DB_URL" -v ON_ERROR_STOP=1 -q -f "$FILE"; then
              echo "  ✅ ok"
            else
              echo "  ❌ FAILED: $FILE"
              FAIL=1
            fi
          done

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          if [ "$FAIL" = "1" ]; then
            echo "⚠️ บางไฟล์ migrate ไม่ผ่าน (ดู log ด้านบน)"
            exit 1
          fi
          echo "✅ migrate ครบทุกไฟล์"

      - name: Summary
        if: always()
        run: |
          FILES=$(ls supabase/*.sql 2>/dev/null | wc -l)
          {
            echo "### Migration Result"
            echo "- **SQL files:** $FILES ไฟล์"
            echo "- **เวลา:** $(TZ='Asia/Bangkok' date '+%d/%m/%Y %H:%M ICT')"
          } >> "$GITHUB_STEP_SUMMARY"
